// greeter.proto
// gRPC Greeter 서비스 정의
// Protocol Buffers v3 문법을 사용합니다.
//
// 코드 생성 방법:
//   protoc --go_out=. --go_opt=paths=source_relative \
//          --go-grpc_out=. --go-grpc_opt=paths=source_relative \
//          proto/greeter.proto

syntax = "proto3";

// Go 패키지 경로를 지정합니다.
option go_package = "github.com/curriculum/grpc-example/proto";

// 패키지 이름 (네임스페이스 역할)
package greeter;

// ============================================================
// 메시지 정의
// ============================================================

// HelloRequest는 클라이언트가 서버에 보내는 요청 메시지입니다.
message HelloRequest {
  string name = 1;    // 인사할 대상의 이름
  string language = 2; // 응답 언어 (ko, en, ja 등)
}

// HelloReply는 서버가 클라이언트에게 보내는 응답 메시지입니다.
message HelloReply {
  string message = 1;   // 인사 메시지
  string timestamp = 2; // 응답 생성 시각
}

// StreamRequest는 서버 스트리밍 RPC용 요청입니다.
message StreamRequest {
  string name = 1;  // 인사할 대상
  int32 count = 2;  // 메시지를 몇 번 보낼지
}

// ============================================================
// 서비스 정의
// ============================================================

// Greeter 서비스는 인사 기능을 제공합니다.
service Greeter {
  // SayHello: 단순 단방향 RPC
  // 클라이언트가 요청 1개를 보내면 서버가 응답 1개를 반환합니다.
  rpc SayHello (HelloRequest) returns (HelloReply);

  // SayHelloServerStream: 서버 스트리밍 RPC
  // 클라이언트가 요청 1개를 보내면 서버가 여러 응답을 스트리밍합니다.
  rpc SayHelloServerStream (StreamRequest) returns (stream HelloReply);
}
